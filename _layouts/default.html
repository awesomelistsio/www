<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,500,700,800,900&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght@400;500;600;700">
  <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.min.css">
  <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
</head>

<body>

<div class="mdl-layout mdl-js-layout mdl-layout--fixed-header">

<header class="mdl-layout__header site-header">
<div class="mdl-layout__header-row nav-shell">

<a class="brand" href="{{ '/' | relative_url }}">
<div class="brand-icon">A</div>
<div class="brand-text">Awesome Lists</div>
</a>

<div class="mdl-layout-spacer"></div>

<nav class="mdl-navigation top-nav">
<a class="mdl-navigation__link" href="{{ '/' | relative_url }}#featured">Featured</a>
<a class="mdl-navigation__link" href="{{ '/' | relative_url }}#categories">Categories</a>
<a class="mdl-navigation__link" href="{{ '/' | relative_url }}#lists">Lists</a>
<a class="mdl-navigation__link" href="{{ '/blog/' | relative_url }}">Blog</a>

<a class="repo-button"
href="https://github.com/brandonhimpfen/awesome-lists"
target="_blank">
<i class="material-icons">code</i>
Primary Repo
</a>

</nav>

</div>
</header>

<main class="mdl-layout__content">
{{ content }}

<footer class="footer">
<div class="footer-inner">
<span>© Awesome Lists</span>
<span>https://github.com/brandonhimpfen/awesome-lists</span>
</div>
</footer>

</main>
</div>

<script src="https://code.getmdl.io/1.3.0/material.min.js"></script>
{% if page.custom_js %}
<script src="{{ page.custom_js | relative_url }}"></script>
{% endif %}
</body>
</html>
